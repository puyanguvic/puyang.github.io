<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Local Geometry of Semantic Linearity</title>
  <desc id="desc">Three panels showing analogy offsets, reusable local subspaces, and contextual warping that weakens global linearity in language model representations.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7ef" />
      <stop offset="100%" stop-color="#f3efe6" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbfaf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10233b" flood-opacity="0.08" />
    </filter>

    <marker id="navyArrow" markerWidth="8" markerHeight="8" refX="6.2" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="#244f7a" />
    </marker>
    <marker id="orangeArrow" markerWidth="8" markerHeight="8" refX="6.2" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="#cf6d1d" />
    </marker>
    <marker id="greenArrow" markerWidth="8" markerHeight="8" refX="6.2" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="#6a8f6b" />
    </marker>
  </defs>

  <style>
    .title { fill: #12263f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 28px; font-weight: 700; }
    .subtitle { fill: #526277; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 14px; font-weight: 500; }

    .card { fill: url(#card); stroke: #d7dfeb; stroke-width: 1.5; rx: 26; filter: url(#shadow); }
    .card-title { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 20px; font-weight: 700; }
    .card-text { fill: #4d5d73; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 13.5px; font-weight: 500; }

    .label { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 15px; font-weight: 700; }
    .formula { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 18px; font-weight: 700; }
    .small { fill: #5b6c82; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 12.5px; font-weight: 500; }
    .small-center { fill: #5b6c82; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 12.5px; font-weight: 500; text-anchor: middle; }

    .formula-box { fill: #fff6ea; stroke: #edc28f; stroke-width: 1.4; rx: 16; }
    .step-box { fill: #f6f1e7; stroke: #d7cbb6; stroke-width: 1.4; rx: 16; }

    .blue { fill: #244f7a; }
    .orange { fill: #cf6d1d; }
    .green { fill: #6a8f6b; }
    .purple { fill: #7d6aa0; }

    .soft-line { fill: none; stroke: #9aa9bc; stroke-width: 1.8; stroke-dasharray: 5.5 5.5; }
    .ctx-line { fill: none; stroke: #8fa0b5; stroke-width: 2.4; }
    .guide-line { fill: none; stroke: #b7c3d1; stroke-width: 1.3; }

    .arrow-blue { stroke: #244f7a; stroke-width: 2.8; }
    .arrow-orange { stroke: #cf6d1d; stroke-width: 2.8; }
    .arrow-green { stroke: #6a8f6b; stroke-width: 2.8; }
  </style>

  <rect x="0" y="0" width="980" height="560" fill="url(#bg)" rx="34" />

  <!-- Header -->
  <text class="title" x="52" y="64">Semantic Linearity Is Usually Local, Not Global</text>
  <text class="subtitle" x="52" y="90">
    <tspan x="52" dy="0">Stable relation offsets emerge when many lexical pairs share similar context statistics,</tspan>
    <tspan x="52" dy="18">but contextualization bends those offsets away from a single universal axis.</tspan>
  </text>

  <!-- Formula box -->
  <rect class="formula-box" x="692" y="94" width="246" height="72" rx="16" />
  <text class="formula" x="815" y="118" text-anchor="middle">
    <tspan>v</tspan><tspan baseline-shift="sub" font-size="11">b</tspan>
    <tspan> − v</tspan><tspan baseline-shift="sub" font-size="11">a</tspan>
    <tspan> ≈ v</tspan><tspan baseline-shift="sub" font-size="11">d</tspan>
    <tspan> − v</tspan><tspan baseline-shift="sub" font-size="11">c</tspan>
  </text>
  <text class="small-center" x="815" y="140">idealized relation</text>
  <text class="small-center" x="815" y="155">often only locally valid</text>

  <!-- Cards -->
  <rect class="card" x="44" y="176" width="286" height="314" rx="26" />
  <rect class="card" x="347" y="176" width="286" height="314" rx="26" />
  <rect class="card" x="650" y="176" width="286" height="314" rx="26" />

  <!-- Card 1 -->
  <text class="card-title" x="72" y="212">Analogy Offset</text>
  <text class="card-text" x="72" y="235">
    <tspan x="72" dy="0">Repeated relations are compressed</tspan>
    <tspan x="72" dy="17">into reusable vector differences.</tspan>
  </text>
  <text class="small" x="72" y="270">same offset family</text>
  <text class="small" x="72" y="287">works for analogy retrieval</text>

  <circle cx="108" cy="390" r="6.3" class="blue" />
  <circle cx="204" cy="314" r="6.3" class="blue" />
  <circle cx="154" cy="436" r="6.3" class="orange" />
  <circle cx="250" cy="360" r="6.3" class="orange" />

  <line x1="108" y1="390" x2="196" y2="321" class="arrow-blue" marker-end="url(#navyArrow)" />
  <line x1="154" y1="436" x2="242" y2="367" class="arrow-orange" marker-end="url(#orangeArrow)" />
  <line class="soft-line" x1="108" y1="390" x2="154" y2="436" />
  <line class="soft-line" x1="204" y1="314" x2="250" y2="360" />

  <text class="label" x="80" y="384">man</text>
  <text class="label" x="200" y="306">king</text>
  <text class="label" x="126" y="460">woman</text>
  <text class="label" x="246" y="383">queen</text>

  <!-- Card 2 -->
  <text class="card-title" x="375" y="212">Subspace Sharing</text>
  <text class="card-text" x="375" y="235">
    <tspan x="375" dy="0">Gender, tense, and number behave</tspan>
    <tspan x="375" dy="17">more like local direction families.</tspan>
  </text>

  <circle cx="394" cy="300" r="6.3" class="blue" />
  <circle cx="439" cy="272" r="6.3" class="blue" />
  <line x1="394" y1="300" x2="431" y2="277" class="arrow-blue" marker-end="url(#navyArrow)" />

  <circle cx="394" cy="372" r="6.3" class="orange" />
  <circle cx="451" cy="372" r="6.3" class="orange" />
  <line x1="394" y1="372" x2="443" y2="372" class="arrow-orange" marker-end="url(#orangeArrow)" />

  <circle cx="398" cy="440" r="6.3" class="green" />
  <circle cx="443" cy="408" r="6.3" class="green" />
  <line x1="398" y1="440" x2="435" y2="414" class="arrow-green" marker-end="url(#greenArrow)" />

  <text class="small" x="470" y="282">gender</text>
  <text class="small" x="470" y="376">plural</text>
  <text class="small" x="470" y="422">tense</text>

  <rect class="step-box" x="522" y="262" width="88" height="34" rx="15" />
  <rect class="step-box" x="522" y="354" width="88" height="34" rx="15" />
  <rect class="step-box" x="522" y="420" width="88" height="34" rx="15" />

  <text class="small-center" x="566" y="283">local cluster</text>
  <text class="small-center" x="566" y="375">transferable</text>
  <text class="small-center" x="566" y="441">not universal</text>

  <!-- Card 3 -->
  <text class="card-title" x="678" y="212">Contextual Warping</text>
  <text class="card-text" x="678" y="235">
    <tspan x="678" dy="0">The same token drifts across contexts,</tspan>
    <tspan x="678" dy="17">weakening any single global offset.</tspan>
  </text>

  <text class="small" x="678" y="270">same lexical type</text>
  <text class="small" x="678" y="287">different hidden states</text>

  <path class="ctx-line" d="M700 418 C728 332, 780 298, 832 334 C862 356, 886 376, 905 340" />
  <circle cx="712" cy="402" r="6.3" class="purple" />
  <circle cx="758" cy="322" r="6.3" class="purple" />
  <circle cx="828" cy="339" r="6.3" class="purple" />
  <circle cx="894" cy="351" r="6.3" class="purple" />
  <line class="soft-line" x1="721" y1="399" x2="888" y2="351" />

  <text class="label" x="682" y="444">bank</text>

  <line class="guide-line" x1="708" y1="402" x2="690" y2="389" />
  <text class="small" x="668" y="388">river</text>

  <line class="guide-line" x1="758" y1="322" x2="778" y2="302" />
  <text class="small" x="780" y="300">central bank</text>

  <line class="guide-line" x1="828" y1="339" x2="850" y2="326" />
  <text class="small" x="852" y="325">investment</text>

  <line class="guide-line" x1="894" y1="351" x2="882" y2="378" />
  <text class="small" x="790" y="387">context drift</text>

  <!-- Bottom summaries -->
  <rect class="step-box" x="64" y="500" width="246" height="24" rx="12" />
  <rect class="step-box" x="367" y="500" width="246" height="24" rx="12" />
  <rect class="step-box" x="670" y="500" width="246" height="24" rx="12" />

  <text class="small-center" x="187" y="516">Offsets encode repeated lexical relations</text>
  <text class="small-center" x="490" y="516">Directions are usually local subspaces</text>
  <text class="small-center" x="793" y="516">Context bends upper-layer geometry</text>
</svg>
