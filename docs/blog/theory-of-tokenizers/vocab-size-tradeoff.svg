<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Vocabulary Size Tradeoff</title>
  <desc id="desc">Academic-style diagram showing the tradeoff between sequence-length savings and vocabulary-side cost, yielding an intermediate optimal vocabulary size.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7ef"/>
      <stop offset="100%" stop-color="#f3efe6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfaf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10233b" flood-opacity="0.08"/>
    </filter>
  </defs>

  <style>
    .title { fill:#12263f; font-family:"Avenir Next","PingFang SC","Noto Sans SC","Source Han Sans SC",sans-serif; font-size:28px; font-weight:700; }
    .subtitle { fill:#526277; font-family:"Avenir Next","PingFang SC","Noto Sans SC","Source Han Sans SC",sans-serif; font-size:14px; font-weight:500; }

    .card { fill:url(#card); stroke:#d7dfeb; stroke-width:1.4; rx:22; filter:url(#shadow); }
    .card-title { fill:#16324f; font-family:"Avenir Next","PingFang SC","Noto Sans SC","Source Han Sans SC",sans-serif; font-size:18px; font-weight:700; }
    .body { fill:#4d5d73; font-family:"Avenir Next","PingFang SC","Noto Sans SC","Source Han Sans SC",sans-serif; font-size:12px; font-weight:500; }
    .label { fill:#16324f; font-family:"Avenir Next","PingFang SC","Noto Sans SC","Source Han Sans SC",sans-serif; font-size:13px; font-weight:700; }
    .small { fill:#5b6c82; font-family:"Avenir Next","PingFang SC","Noto Sans SC","Source Han Sans SC",sans-serif; font-size:11px; font-weight:500; }
    .center { text-anchor:middle; }

    .formula-box { fill:#fff6ea; stroke:#edc28f; stroke-width:1.3; rx:14; }
    .step-box { fill:#f6f1e7; stroke:#d7cbb6; stroke-width:1.3; rx:14; }

    .axis { stroke:#72859b; stroke-width:2; }
    .grid { stroke:#dbe3ed; stroke-width:1.1; }
    .down { fill:none; stroke:#244f7a; stroke-width:3.3; }
    .up { fill:none; stroke:#cf6d1d; stroke-width:3.3; }
    .total { fill:none; stroke:#6a8f6b; stroke-width:4; }
    .spot { fill:#cf6d1d; stroke:#ffffff; stroke-width:2.5; }
  </style>

  <rect x="0" y="0" width="980" height="560" fill="url(#bg)" rx="34"/>

  <text class="title" x="52" y="60">Vocabulary Size Has a Genuine Sweet Spot</text>
  <text class="subtitle" x="52" y="84">
    <tspan x="52" dy="0">Larger vocabularies shorten sequences, but the gain saturates.</tspan>
    <tspan x="52" dy="17">Vocabulary-side cost keeps rising, so the best region is intermediate.</tspan>
  </text>

  <rect class="formula-box" x="344" y="114" width="292" height="50" rx="14"/>
  <text class="label center" x="490" y="135">J(V) ≈ a T(V)^2 + b T(V) + c V</text>
  <text class="small center" x="490" y="152">sequence cost falls; vocabulary cost rises</text>

  <rect class="card" x="44" y="188" width="560" height="284" rx="22"/>
  <rect class="card" x="630" y="188" width="306" height="284" rx="22"/>

  <text class="card-title" x="74" y="220">System cost vs. vocabulary size</text>
  <text class="body" x="74" y="242">The optimum is neither very small nor very large.</text>

  <line class="axis" x1="96" y1="430" x2="560" y2="430"/>
  <line class="axis" x1="96" y1="430" x2="96" y2="272"/>

  <line class="grid" x1="96" y1="382" x2="560" y2="382"/>
  <line class="grid" x1="96" y1="334" x2="560" y2="334"/>
  <line class="grid" x1="212" y1="430" x2="212" y2="272"/>
  <line class="grid" x1="328" y1="430" x2="328" y2="272"/>
  <line class="grid" x1="444" y1="430" x2="444" y2="272"/>

  <path class="down" d="M112 286 C176 294, 246 316, 314 347 C378 377, 448 398, 548 412"/>
  <path class="up" d="M112 412 C212 398, 300 380, 392 346 C454 322, 504 299, 548 274"/>
  <path class="total" d="M112 360 C182 320, 252 295, 312 293 C374 291, 434 309, 548 372"/>

  <circle class="spot" cx="324" cy="293" r="7"/>
  <text class="small" x="338" y="289">sweet spot</text>

  <text class="small" x="440" y="410">sequence cost</text>
  <text class="small" x="450" y="292">vocabulary cost</text>
  <text class="small" x="246" y="276">total cost</text>

  <text class="small" x="96" y="452">small V</text>
  <text class="small center" x="328" y="452">medium V</text>
  <text class="small" x="560" y="452" text-anchor="end">large V</text>

  <text class="card-title" x="658" y="220">What changes with V?</text>
  <text class="body" x="658" y="242">Three regimes dominate.</text>

  <rect class="step-box" x="658" y="278" width="250" height="42" rx="12"/>
  <rect class="step-box" x="658" y="334" width="250" height="42" rx="12"/>
  <rect class="step-box" x="658" y="390" width="250" height="50" rx="12"/>

  <text class="label" x="678" y="295">Small V</text>
  <text class="small" x="678" y="311">long sequences, cheap vocabulary</text>

  <text class="label" x="678" y="351">Medium V</text>
  <text class="small" x="678" y="367">best compression / learning balance</text>

  <text class="label" x="678" y="407">Large V</text>
  <text class="small" x="678" y="421">shorter sequences, sparse tail</text>
  <text class="small" x="678" y="436">larger output head</text>

  <rect class="step-box" x="186" y="506" width="608" height="22" rx="11"/>
  <text class="small center" x="490" y="521">Zipfian head yields large early gains, but long-tail gains fade while vocabulary-side cost keeps rising.</text>
</svg>
