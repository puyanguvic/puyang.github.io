<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">Distance Concentration</title>
  <desc id="desc">Comparison of broad pairwise-distance distributions in low dimensions and narrow concentration in high dimensions, including the shrinking gap between nearest and farthest neighbors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7ef" />
      <stop offset="100%" stop-color="#f3efe6" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbfaf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10233b" flood-opacity="0.08" />
    </filter>
  </defs>
  <style>
    .title { fill: #12263f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 30px; font-weight: 700; }
    .subtitle { fill: #526277; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 16px; font-weight: 500; }
    .card { fill: url(#card); stroke: #d7dfeb; stroke-width: 1.5; rx: 28; filter: url(#shadow); }
    .card-title { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 22px; font-weight: 700; }
    .card-text { fill: #4d5d73; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 15px; font-weight: 500; }
    .pill { fill: #e7eef8; }
    .pill-text { fill: #28496d; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.6px; }
    .axis { stroke: #6f8097; stroke-width: 2.4; }
    .tick { stroke: #93a3b8; stroke-width: 1.6; }
    .curve-low { fill: rgba(69, 126, 182, 0.16); stroke: #2f6ca3; stroke-width: 4; }
    .curve-high { fill: rgba(242, 156, 74, 0.18); stroke: #cf6d1d; stroke-width: 4; }
    .mark-low { stroke: #214f79; stroke-width: 4; }
    .mark-high { stroke: #b55e15; stroke-width: 4; }
    .dash { stroke: #98a7ba; stroke-width: 2; stroke-dasharray: 7 7; }
    .label { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 16px; font-weight: 700; }
    .small { fill: #5b6c82; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 14px; font-weight: 500; }
  </style>

  <rect x="0" y="0" width="980" height="540" fill="url(#bg)" rx="34" />

  <rect class="pill" x="52" y="36" width="92" height="34" rx="17" />
  <text class="pill-text" x="98" y="58" text-anchor="middle">FIGURE 2</text>
  <text class="title" x="52" y="112">Distance Concentration: Neighbor Gaps Shrink</text>
  <text class="subtitle" x="52" y="142">When pairwise distances collapse into the same narrow band, ranking still exists, but relative resolution drops sharply.</text>

  <rect class="card" x="44" y="176" width="418" height="314" rx="28" />
  <rect class="card" x="518" y="176" width="418" height="314" rx="28" />

  <text class="card-title" x="74" y="216">Low Dimension: Broad Distances</text>
  <text class="card-text" x="74" y="242">Near and far points form clearer layers, so ranking is more stable.</text>

  <line class="axis" x1="92" y1="408" x2="414" y2="408" />
  <line class="tick" x1="140" y1="402" x2="140" y2="414" />
  <line class="tick" x1="230" y1="402" x2="230" y2="414" />
  <line class="tick" x1="320" y1="402" x2="320" y2="414" />
  <path class="curve-low" d="M104 408 C138 403, 158 332, 194 295 C229 259, 274 253, 313 287 C344 314, 364 366, 392 408 Z" />
  <line class="mark-low" x1="138" y1="408" x2="138" y2="310" />
  <line class="mark-low" x1="344" y1="408" x2="344" y2="324" />
  <text class="label" x="122" y="294">D_min</text>
  <text class="label" x="320" y="308">D_max</text>
  <text class="small" x="254" y="454" text-anchor="middle">A larger relative gap makes nearest neighbors stand out</text>

  <text class="card-title" x="548" y="216">High Dimension: Narrow Distance Band</text>
  <text class="card-text" x="548" y="242">Typical distance is about √(2d), with only limited extreme deviations.</text>

  <line class="axis" x1="566" y1="408" x2="888" y2="408" />
  <line class="tick" x1="640" y1="402" x2="640" y2="414" />
  <line class="tick" x1="728" y1="402" x2="728" y2="414" />
  <line class="tick" x1="816" y1="402" x2="816" y2="414" />
  <path class="curve-high" d="M596 408 C640 405, 676 342, 706 236 C716 200, 741 200, 751 236 C781 342, 817 405, 861 408 Z" />
  <line class="mark-high" x1="695" y1="408" x2="695" y2="268" />
  <line class="mark-high" x1="759" y1="408" x2="759" y2="268" />
  <line class="dash" x1="727" y1="408" x2="727" y2="212" />
  <text class="label" x="676" y="252">D_min</text>
  <text class="label" x="739" y="252">D_max</text>
  <text class="small" x="727" y="198" text-anchor="middle">typical distance ≈ √(2d)</text>
  <text class="small" x="727" y="454" text-anchor="middle">Ranking remains, but the relative gap becomes much smaller</text>
</svg>
