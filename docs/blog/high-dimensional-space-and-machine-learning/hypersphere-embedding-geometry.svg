<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Equal-norm embeddings favor angular geometry</title>
  <desc id="desc">When embeddings lie near a common hyperspherical shell, angle becomes the dominant similarity variable and Euclidean distance is closely linked to cosine similarity.</desc>

  <defs>
    <marker id="arrowBlue" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#1f4f78"/>
    </marker>
    <marker id="arrowOrange" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#cf6d1d"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }

      .title {
        fill: #0f172a;
        font-family: Arial, Helvetica, "Noto Sans", "PingFang SC", sans-serif;
        font-size: 20px;
        font-weight: 700;
      }

      .panel {
        fill: #fcfdff;
        stroke: #d6dee8;
        stroke-width: 1.2;
        rx: 10;
      }

      .panel-title {
        fill: #0f172a;
        font-family: Arial, Helvetica, "Noto Sans", "PingFang SC", sans-serif;
        font-size: 15px;
        font-weight: 700;
      }

      .text {
        fill: #475569;
        font-family: Arial, Helvetica, "Noto Sans", "PingFang SC", sans-serif;
        font-size: 11.8px;
        font-weight: 400;
      }

      .small {
        fill: #64748b;
        font-family: Arial, Helvetica, "Noto Sans", "PingFang SC", sans-serif;
        font-size: 10.8px;
        font-weight: 400;
      }

      .label {
        fill: #0f172a;
        font-family: Arial, Helvetica, "Noto Sans", "PingFang SC", sans-serif;
        font-size: 12.2px;
        font-weight: 600;
      }

      .formula {
        fill: #0f172a;
        font-family: Arial, Helvetica, "Noto Sans", "PingFang SC", sans-serif;
        font-size: 13px;
        font-weight: 500;
      }

      .shell-core {
        fill: rgba(217, 119, 6, 0.08);
        stroke: #fed7aa;
        stroke-width: 1.2;
      }

      .shell-ring {
        fill: none;
        stroke: #d97706;
        stroke-width: 18;
        stroke-linecap: round;
        opacity: 0.9;
      }

      .guide {
        fill: none;
        stroke: #94a3b8;
        stroke-width: 1.3;
        stroke-dasharray: 4 4;
      }

      .angle {
        fill: none;
        stroke: #64748b;
        stroke-width: 1.6;
      }

      .pt-blue { fill: #1f4f78; }
      .pt-orange { fill: #cf6d1d; }
      .pt-green { fill: #7aa07c; }

      .formula-box {
        fill: #f8fafc;
        stroke: #d9e2ec;
        stroke-width: 1;
        rx: 8;
      }

      .note-box {
        fill: #fffaf0;
        stroke: #ead9b8;
        stroke-width: 1;
        rx: 7;
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="520"/>

  <!-- Global title -->
  <text class="title" x="48" y="38">Equal-norm embeddings favor angular geometry</text>

  <!-- Panels -->
  <rect class="panel" x="40" y="84" width="448" height="380" rx="10"/>
  <rect class="panel" x="512" y="84" width="428" height="380" rx="10"/>

  <!-- LEFT PANEL -->
  <text class="panel-title" x="58" y="112">Shared hyperspherical shell</text>
  <text class="text" x="58" y="134">
    <tspan x="58" dy="0">When embedding norms are nearly equal,</tspan>
    <tspan x="58" dy="15">relative direction becomes the main source of variation.</tspan>
  </text>

  <!-- shell -->
  <circle class="shell-core" cx="264" cy="286" r="134"/>
  <circle class="shell-ring" cx="264" cy="286" r="114"/>
  <circle cx="264" cy="286" r="4" fill="#64748b"/>

  <!-- rays -->
  <line x1="264" y1="286" x2="344" y2="200" stroke="#1f4f78" stroke-width="3.2" marker-end="url(#arrowBlue)"/>
  <line x1="264" y1="286" x2="376" y2="268" stroke="#cf6d1d" stroke-width="3.2" marker-end="url(#arrowOrange)"/>
  <line x1="264" y1="286" x2="190" y2="206" stroke="#7aa07c" stroke-width="3.2" marker-end="url(#arrowBlue)" opacity="0.9"/>

  <!-- angle and guides -->
  <path class="angle" d="M312 232 A64 64 0 0 1 370 275"/>
  <path class="guide" d="M264 286 L344 200"/>
  <path class="guide" d="M264 286 L376 268"/>

  <!-- labels -->
  <text class="small" x="349" y="236">θ</text>
  <text class="label" x="349" y="194">x</text>
  <text class="label" x="388" y="271">y</text>
  <text class="label" x="180" y="200">z</text>

  <!-- left bottom labels -->
  <text class="small" x="264" y="396" text-anchor="middle">‖x‖ ≈ ‖y‖ ≈ ‖z‖ ≈ r</text>

  <rect class="note-box" x="112" y="418" width="304" height="28" rx="7"/>
  <text class="small" x="264" y="436" text-anchor="middle">semantic variation is mainly angular on the shell</text>

  <!-- RIGHT PANEL -->
  <text class="panel-title" x="530" y="112">Cosine and Euclidean distance</text>
  <text class="text" x="530" y="134">
    <tspan x="530" dy="0">With nearly fixed norms, cosine similarity becomes</tspan>
    <tspan x="530" dy="15">a stable proxy for Euclidean separation.</tspan>
  </text>

  <rect class="formula-box" x="548" y="176" width="356" height="198" rx="8"/>

  <text class="formula" x="572" y="214">cos θ = (xᵀy) / (‖x‖ ‖y‖)</text>
  <text class="formula" x="572" y="252">‖x − y‖² = ‖x‖² + ‖y‖² − 2xᵀy</text>

  <text class="small" x="572" y="286">if ‖x‖ ≈ ‖y‖ ≈ r, then</text>

  <text class="formula" x="572" y="324">‖x − y‖² ≈ 2r²(1 − cos θ)</text>

  <text class="small" x="572" y="356">equal norms suppress radial variation,</text>
  <text class="small" x="572" y="372">so direction becomes the more discriminative signal</text>

  <rect class="note-box" x="574" y="418" width="304" height="28" rx="7"/>
  <text class="small" x="726" y="436" text-anchor="middle">angle and cosine become the natural similarity variables</text>

  <!-- Bottom note -->
  <text class="small" x="490" y="492" text-anchor="middle">
    Once embeddings lie near a common shell, Euclidean distance is driven mainly by angular separation.
  </text>
</svg>
