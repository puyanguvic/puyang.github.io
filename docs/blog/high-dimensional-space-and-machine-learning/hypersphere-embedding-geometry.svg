<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Embedding Geometry on a Hyperspherical Shell</title>
  <desc id="desc">Shows how angles become the natural similarity variable when embeddings lie near an equal-norm shell, and how Euclidean distance relates to cosine similarity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7ef" />
      <stop offset="100%" stop-color="#f3efe6" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbfaf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10233b" flood-opacity="0.08" />
    </filter>
    <marker id="navyArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f4f78" />
    </marker>
    <marker id="amberArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#cf6d1d" />
    </marker>
  </defs>
  <style>
    .title { fill: #12263f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 30px; font-weight: 700; }
    .subtitle { fill: #526277; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 16px; font-weight: 500; }
    .card { fill: url(#card); stroke: #d7dfeb; stroke-width: 1.5; rx: 28; filter: url(#shadow); }
    .pill { fill: #e7eef8; }
    .pill-text { fill: #28496d; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.6px; }
    .card-title { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 22px; font-weight: 700; }
    .card-text { fill: #4d5d73; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 15px; font-weight: 500; }
    .shell-base { fill: #fff0df; stroke: #e2b280; stroke-width: 2; }
    .shell-ring { fill: none; stroke: #f29c4a; stroke-width: 24; opacity: 0.92; }
    .point-a { fill: #1f4f78; }
    .point-b { fill: #cf6d1d; }
    .point-c { fill: #7aa07c; }
    .guide { fill: none; stroke: #8fa0b5; stroke-width: 2; stroke-dasharray: 6 6; }
    .angle { fill: none; stroke: #7d8ea5; stroke-width: 2.2; }
    .formula-box { fill: #f6f1e7; stroke: #d7cbb6; stroke-width: 1.5; rx: 20; }
    .step-box { fill: #fff6ea; stroke: #edc28f; stroke-width: 1.5; rx: 18; }
    .label { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 16px; font-weight: 700; }
    .small { fill: #5b6c82; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 14px; font-weight: 500; }
    .formula { fill: #20364f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 18px; font-weight: 600; }
  </style>

  <rect x="0" y="0" width="980" height="560" fill="url(#bg)" rx="34" />

  <rect class="pill" x="52" y="36" width="92" height="34" rx="17" />
  <text class="pill-text" x="98" y="58" text-anchor="middle">FIGURE 1</text>
  <text class="title" x="52" y="112">Shell Geometry: Equal-Norm Embeddings Favor Angles</text>
  <text class="subtitle" x="52" y="142">Once embedding lengths stabilize at the same scale, the dominant variation in Euclidean distance moves into the angle term.</text>

  <rect class="card" x="44" y="176" width="456" height="330" rx="28" />
  <rect class="card" x="528" y="176" width="408" height="330" rx="28" />

  <text class="card-title" x="74" y="216">Left: Shared Shell</text>
  <text class="card-text" x="74" y="242">With similar radii, semantics mainly follow relative positions on the sphere.</text>

  <circle class="shell-base" cx="264" cy="350" r="136" opacity="0.72" />
  <circle class="shell-ring" cx="264" cy="350" r="116" />
  <circle cx="264" cy="350" r="5" fill="#7d8ea5" />
  <line x1="264" y1="350" x2="349" y2="259" stroke="#1f4f78" stroke-width="4" marker-end="url(#navyArrow)" />
  <line x1="264" y1="350" x2="378" y2="332" stroke="#cf6d1d" stroke-width="4" marker-end="url(#amberArrow)" />
  <line x1="264" y1="350" x2="184" y2="262" stroke="#7aa07c" stroke-width="4" marker-end="url(#navyArrow)" opacity="0.85" />
  <path class="angle" d="M316 294 A70 70 0 0 1 376 339" />
  <text class="small" x="353" y="304">θ</text>
  <text class="label" x="353" y="252">x</text>
  <text class="label" x="392" y="334">y</text>
  <text class="label" x="176" y="252">z</text>
  <path class="guide" d="M264 350 L349 259" />
  <path class="guide" d="M264 350 L378 332" />
  <text class="small" x="120" y="458">||x|| ~= ||y|| ~= ||z|| ~= r</text>

  <text class="card-title" x="558" y="216">Right: Cosine vs. Distance</text>
  <text class="card-text" x="558" y="242">If norms are nearly fixed, direction becomes the more stable discriminative signal.</text>

  <rect class="formula-box" x="558" y="276" width="348" height="146" rx="20" />
  <text class="formula" x="584" y="320">cos θ = x^T y / (||x|| ||y||)</text>
  <text class="formula" x="584" y="356">||x - y||^2 = ||x||^2 + ||y||^2 - 2 x^T y</text>
  <text class="formula" x="584" y="392">if ||x|| ≈ ||y|| ≈ r, then</text>
  <text class="formula" x="584" y="420">||x - y||^2 ≈ 2 r^2 (1 - cos θ)</text>

  <rect class="step-box" x="92" y="494" width="244" height="40" rx="20" />
  <rect class="step-box" x="368" y="494" width="244" height="40" rx="20" />
  <rect class="step-box" x="644" y="494" width="244" height="40" rx="20" />
  <text class="small" x="214" y="519" text-anchor="middle">Norms concentrate first</text>
  <text class="small" x="490" y="519" text-anchor="middle">Training reduces radial drift</text>
  <text class="small" x="766" y="519" text-anchor="middle">Direction carries semantics</text>
</svg>
