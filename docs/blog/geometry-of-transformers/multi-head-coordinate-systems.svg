<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Head Attention as Parallel Coordinate Systems</title>
  <desc id="desc">Compares a single attention head that forces all relations into one coordinate system with multiple heads that build parallel coordinate systems and recombine them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7ef" />
      <stop offset="100%" stop-color="#f3efe6" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbfaf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10233b" flood-opacity="0.08" />
    </filter>
    <marker id="navyArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#244f7a" />
    </marker>
    <marker id="orangeArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#cf6d1d" />
    </marker>
  </defs>
  <style>
    .title { fill: #12263f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 30px; font-weight: 700; }
    .subtitle { fill: #526277; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 16px; font-weight: 500; }
    .pill { fill: #e7eef8; }
    .pill-text { fill: #28496d; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.6px; }
    .card { fill: url(#card); stroke: #d7dfeb; stroke-width: 1.5; rx: 28; filter: url(#shadow); }
    .card-title { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 22px; font-weight: 700; }
    .card-text { fill: #4d5d73; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 14px; font-weight: 500; }
    .label { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 15px; font-weight: 700; }
    .small { fill: #5b6c82; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 13px; font-weight: 500; }
    .formula-box { fill: #fff6ea; stroke: #edc28f; stroke-width: 1.5; rx: 18; }
    .step-box { fill: #f6f1e7; stroke: #d7cbb6; stroke-width: 1.5; rx: 18; }
    .blue { fill: #244f7a; }
    .orange { fill: #cf6d1d; }
    .green { fill: #6a8f6b; }
    .purple { fill: #7d6aa0; }
    .teal { fill: #4b8f96; }
    .box { fill: #fff9f0; stroke: #dfcdb4; stroke-width: 1.5; rx: 18; }
    .flow { stroke: #7e8ea4; stroke-width: 2.2; fill: none; marker-end: url(#navyArrow); }
  </style>

  <rect x="0" y="0" width="980" height="560" fill="url(#bg)" rx="34" />

  <rect class="pill" x="52" y="36" width="92" height="34" rx="17" />
  <text class="pill-text" x="98" y="58" text-anchor="middle">FIGURE 1</text>
  <text class="title" x="52" y="112">Multi-Head Attention Builds Parallel Context Coordinate Systems</text>
  <text class="subtitle" x="52" y="142">A single head forces every relation into one attention map; multiple heads create parallel maps and recombine them through the output projection.</text>

  <rect class="card" x="44" y="176" width="276" height="330" rx="28" />
  <rect class="card" x="338" y="176" width="598" height="330" rx="28" />

  <text class="card-title" x="72" y="216">Single Head</text>
  <text class="card-text" x="72" y="240">One metric, one attention map, one reconstruction path.</text>
  <rect class="box" x="84" y="278" width="196" height="64" rx="16" />
  <rect class="box" x="84" y="364" width="196" height="64" rx="16" />
  <text class="label" x="182" y="305" text-anchor="middle">one QK metric</text>
  <text class="small" x="182" y="328" text-anchor="middle">syntax, coreference, position</text>
  <text class="label" x="182" y="391" text-anchor="middle">one attention simplex</text>
  <text class="small" x="182" y="414" text-anchor="middle">all relations compete here</text>
  <path class="flow" d="M182 342 L182 362" />
  <text class="small" x="88" y="454">good enough for one view</text>
  <text class="small" x="88" y="474">weak for heterogeneous relations</text>

  <text class="card-title" x="366" y="216">Multi-Head</text>
  <text class="card-text" x="366" y="240">Each head learns its own geometry, coordinates, and value channel before recombination.</text>

  <rect class="box" x="380" y="280" width="148" height="62" rx="16" />
  <rect class="box" x="560" y="280" width="148" height="62" rx="16" />
  <rect class="box" x="740" y="280" width="148" height="62" rx="16" />
  <text class="label" x="454" y="306" text-anchor="middle">Head 1</text>
  <text class="small" x="454" y="328" text-anchor="middle">local syntax</text>
  <text class="label" x="634" y="306" text-anchor="middle">Head 2</text>
  <text class="small" x="634" y="328" text-anchor="middle">coreference</text>
  <text class="label" x="814" y="306" text-anchor="middle">Head 3</text>
  <text class="small" x="814" y="328" text-anchor="middle">position / discourse</text>

  <polygon points="454,372 412,438 496,438" fill="#fff4e3" stroke="#e2b280" stroke-width="2" />
  <polygon points="634,372 592,438 676,438" fill="#eef5fb" stroke="#9eb9d7" stroke-width="2" />
  <polygon points="814,372 772,438 856,438" fill="#eef6ef" stroke="#a8c5aa" stroke-width="2" />
  <circle cx="454" cy="392" r="6" class="orange" />
  <circle cx="430" cy="424" r="6" class="orange" />
  <circle cx="478" cy="424" r="6" class="orange" />
  <circle cx="640" cy="406" r="6" class="blue" />
  <circle cx="614" cy="424" r="6" class="blue" />
  <circle cx="654" cy="390" r="6" class="blue" />
  <circle cx="804" cy="414" r="6" class="green" />
  <circle cx="788" cy="394" r="6" class="green" />
  <circle cx="834" cy="424" r="6" class="green" />
  <text class="small" x="454" y="456" text-anchor="middle">α^(1)</text>
  <text class="small" x="634" y="456" text-anchor="middle">α^(2)</text>
  <text class="small" x="814" y="456" text-anchor="middle">α^(3)</text>

  <path class="flow" d="M454 342 L454 368" />
  <path class="flow" d="M634 342 L634 368" />
  <path class="flow" d="M814 342 L814 368" />

  <rect class="formula-box" x="560" y="64" width="310" height="72" rx="18" />
  <text class="label" x="715" y="92" text-anchor="middle">MHA(X) = Concat(H₁, ..., H_m) W_O</text>
  <text class="small" x="715" y="118" text-anchor="middle">parallel reconstructions, then recombination</text>

  <rect class="step-box" x="82" y="516" width="242" height="24" rx="12" />
  <rect class="step-box" x="368" y="516" width="242" height="24" rx="12" />
  <rect class="step-box" x="654" y="516" width="242" height="24" rx="12" />
  <text class="small" x="203" y="533" text-anchor="middle">Single head mixes many relations together</text>
  <text class="small" x="489" y="533" text-anchor="middle">Different heads separate matching geometries</text>
  <text class="small" x="775" y="533" text-anchor="middle">Output projection merges the partial views</text>
</svg>
