<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Attention as Soft Coordinates and Reconstruction</title>
  <desc id="desc">Shows a query probing key geometry, softmax producing simplex coordinates, and the output as a weighted reconstruction in value space.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf7ef" />
      <stop offset="100%" stop-color="#f3efe6" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbfaf6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10233b" flood-opacity="0.08" />
    </filter>
    <marker id="navyArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#244f7a" />
    </marker>
    <marker id="orangeArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#cf6d1d" />
    </marker>
  </defs>
  <style>
    .title { fill: #12263f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 30px; font-weight: 700; }
    .subtitle { fill: #526277; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 16px; font-weight: 500; }
    .pill { fill: #e7eef8; }
    .pill-text { fill: #28496d; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.6px; }
    .card { fill: url(#card); stroke: #d7dfeb; stroke-width: 1.5; rx: 28; filter: url(#shadow); }
    .card-title { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 21px; font-weight: 700; }
    .card-text { fill: #4d5d73; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 14px; font-weight: 500; }
    .label { fill: #16324f; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 15px; font-weight: 700; }
    .small { fill: #5b6c82; font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Source Han Sans SC", sans-serif; font-size: 13px; font-weight: 500; }
    .formula-box { fill: #fff6ea; stroke: #edc28f; stroke-width: 1.5; rx: 18; }
    .step-box { fill: #f6f1e7; stroke: #d7cbb6; stroke-width: 1.5; rx: 18; }
    .blue { fill: #244f7a; }
    .orange { fill: #cf6d1d; }
    .green { fill: #6a8f6b; }
    .purple { fill: #7d6aa0; }
    .grid { stroke: #dbe3ed; stroke-width: 1.2; }
    .axis { stroke: #73859a; stroke-width: 2; }
    .guide { fill: none; stroke: #8fa0b5; stroke-width: 2; stroke-dasharray: 6 6; }
  </style>

  <rect x="0" y="0" width="980" height="560" fill="url(#bg)" rx="34" />

  <rect class="pill" x="52" y="36" width="92" height="34" rx="17" />
  <text class="pill-text" x="98" y="58" text-anchor="middle">FIGURE 1</text>
  <text class="title" x="52" y="112">Attention Builds Soft Coordinates Before Reconstruction</text>
  <text class="subtitle" x="52" y="142">A query probes key geometry, softmax converts compatibilities into simplex coordinates, and the output is reconstructed in value space.</text>

  <rect class="card" x="44" y="176" width="284" height="330" rx="28" />
  <rect class="card" x="348" y="176" width="284" height="330" rx="28" />
  <rect class="card" x="652" y="176" width="284" height="330" rx="28" />

  <text class="card-title" x="72" y="216">1. Query-Key Geometry</text>
  <text class="card-text" x="72" y="240">The query probes which keys are relevant under the learned bilinear metric.</text>
  <line class="axis" x1="88" y1="450" x2="284" y2="450" />
  <line class="axis" x1="88" y1="450" x2="88" y2="270" />
  <line class="grid" x1="88" y1="390" x2="284" y2="390" />
  <line class="grid" x1="88" y1="330" x2="284" y2="330" />
  <line class="grid" x1="148" y1="450" x2="148" y2="270" />
  <line class="grid" x1="208" y1="450" x2="208" y2="270" />
  <circle cx="140" cy="344" r="8" class="blue" />
  <circle cx="198" cy="304" r="8" class="orange" />
  <circle cx="244" cy="394" r="8" class="green" />
  <circle cx="254" cy="286" r="8" class="purple" />
  <line x1="110" y1="420" x2="196" y2="308" stroke="#244f7a" stroke-width="4" marker-end="url(#navyArrow)" />
  <text class="label" x="96" y="432">q</text>
  <text class="small" x="130" y="338">k₁</text>
  <text class="small" x="206" y="298">k₂</text>
  <text class="small" x="250" y="408">k₃</text>
  <text class="small" x="262" y="282">k₄</text>

  <text class="card-title" x="376" y="216">2. Softmax on the Simplex</text>
  <text class="card-text" x="376" y="240">Compatibility scores become nonnegative coordinates whose sum is exactly one.</text>
  <polygon points="490,286 398,426 582,426" fill="#fff4e3" stroke="#e2b280" stroke-width="2" />
  <circle cx="490" cy="312" r="7" class="blue" />
  <circle cx="438" cy="392" r="7" class="orange" />
  <circle cx="542" cy="392" r="7" class="green" />
  <circle cx="480" cy="364" r="7" fill="#cf6d1d" />
  <text class="small" x="490" y="300" text-anchor="middle">e₂</text>
  <text class="small" x="428" y="409">e₁</text>
  <text class="small" x="548" y="409">e₃</text>
  <text class="label" x="488" y="356">α</text>
  <text class="small" x="410" y="456">α ∈ Δ^(n-1)</text>
  <text class="small" x="410" y="476">nonnegative, sums to 1</text>

  <text class="card-title" x="680" y="216">3. Value Reconstruction</text>
  <text class="card-text" x="680" y="240">The coordinates are reused in value space, yielding a barycentric reconstruction.</text>
  <circle cx="774" cy="322" r="8" class="blue" />
  <circle cx="708" cy="406" r="8" class="orange" />
  <circle cx="846" cy="392" r="8" class="green" />
  <circle cx="784" cy="374" r="8" fill="#cf6d1d" />
  <line class="guide" x1="784" y1="374" x2="774" y2="322" />
  <line class="guide" x1="784" y1="374" x2="708" y2="406" />
  <line class="guide" x1="784" y1="374" x2="846" y2="392" />
  <text class="small" x="784" y="364">o = Σ αⱼ vⱼ</text>
  <text class="small" x="764" y="316">v₂</text>
  <text class="small" x="690" y="420">v₁</text>
  <text class="small" x="852" y="406">v₃</text>

  <rect class="formula-box" x="344" y="54" width="292" height="72" rx="18" />
  <text class="label" x="490" y="84" text-anchor="middle">A = softmax(QKᵀ / √dₖ)</text>
  <text class="small" x="490" y="110" text-anchor="middle">O = AV</text>

  <rect class="step-box" x="84" y="516" width="242" height="24" rx="12" />
  <rect class="step-box" x="368" y="516" width="242" height="24" rx="12" />
  <rect class="step-box" x="652" y="516" width="242" height="24" rx="12" />
  <text class="small" x="205" y="533" text-anchor="middle">A learned compatibility metric selects context</text>
  <text class="small" x="489" y="533" text-anchor="middle">Softmax makes the coordinates probabilistic</text>
  <text class="small" x="773" y="533" text-anchor="middle">Values are reconstructed, not merely copied</text>
</svg>
