<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Context policy trade-off map</title>
  <desc id="desc">A systems diagram showing that context policies must balance multiple objectives, and that each policy move helps some objectives while hurting others.</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#64748b"/>
    </marker>
  </defs>

  <style>
    .bg { fill: #ffffff; }
    .frame { fill: #ffffff; stroke: #d9e1ec; stroke-width: 1.8; rx: 18; }
    .rule { stroke: #d9e1ec; stroke-width: 1.4; }
    .title { fill: #0f172a; font: 700 28px "Inter", "Segoe UI", sans-serif; }
    .subtitle { fill: #475569; font: 500 15px "Inter", "Segoe UI", sans-serif; }
    .panelTitle { fill: #0f172a; font: 700 21px "Inter", "Segoe UI", sans-serif; }
    .num { fill: #ffffff; font: 700 13px "Inter", "Segoe UI", sans-serif; }
    .label { fill: #334155; font: 600 15px "Inter", "Segoe UI", sans-serif; }
    .body { fill: #475569; font: 500 13px "Inter", "Segoe UI", sans-serif; }
    .mono { fill: #0f172a; font: 700 16px "JetBrains Mono", "SFMono-Regular", monospace; }
    .chipA { fill: #f5f9ff; stroke: #bfd8ff; stroke-width: 1.3; rx: 12; }
    .chipB { fill: #f4fcf7; stroke: #bde8cb; stroke-width: 1.3; rx: 12; }
    .chipC { fill: #fffaf0; stroke: #f0d58a; stroke-width: 1.3; rx: 12; }
    .chipD { fill: #faf5ff; stroke: #dac3f5; stroke-width: 1.3; rx: 12; }
    .chipE { fill: #fff6f7; stroke: #f1c0ca; stroke-width: 1.3; rx: 12; }
    .chipF { fill: #f6fbfb; stroke: #b9e0dd; stroke-width: 1.3; rx: 12; }
    .barA { fill: #60a5fa; }
    .barB { fill: #34d399; }
    .barC { fill: #fbbf24; }
    .barD { fill: #a78bfa; }
    .barE { fill: #fb7185; }
    .barF { fill: #14b8a6; }
    .summary { fill: #fbfcfe; stroke: #dbe3ee; stroke-width: 1.2; rx: 12; }
    .badge { fill: #f5f7fb; stroke: #dbe3ee; stroke-width: 1.2; rx: 10; }
    .n1 { fill: #3b82f6; }
    .n2 { fill: #10b981; }
    .n3 { fill: #8b5cf6; }
    .arrow { stroke: #64748b; stroke-width: 2.5; stroke-linecap: round; marker-end: url(#arrowhead); }
    .good { fill: #166534; font: 700 13px "Inter", "Segoe UI", sans-serif; }
    .bad { fill: #b91c1c; font: 700 13px "Inter", "Segoe UI", sans-serif; }
    .neutral { fill: #475569; font: 700 13px "Inter", "Segoe UI", sans-serif; }
    .footer { fill: #f8fafc; stroke: #d9e1ec; stroke-width: 1.2; rx: 14; }
    .footerText { fill: #334155; font: 600 13px "Inter", "Segoe UI", sans-serif; }
  </style>

  <rect class="bg" width="1200" height="820" rx="24"/>

  <text class="title" x="56" y="62">No single context policy dominates across all objectives</text>
  <text class="subtitle" x="56" y="89">A policy that improves one objective often worsens another, so context optimization is inherently multi-objective.</text>
  <line class="rule" x1="56" y1="108" x2="1144" y2="108"/>

  <rect class="frame" x="48" y="130" width="284" height="620" rx="18"/>
  <rect class="frame" x="364" y="130" width="330" height="620" rx="18"/>
  <rect class="frame" x="726" y="130" width="426" height="620" rx="18"/>

  <circle class="n1" cx="74" cy="162" r="13"/>
  <text class="num" x="70.1" y="166.7">1</text>
  <text class="panelTitle" x="96" y="169">Objectives</text>

  <circle class="n2" cx="390" cy="162" r="13"/>
  <text class="num" x="386.2" y="166.7">2</text>
  <text class="panelTitle" x="412" y="169">Policy moves</text>

  <circle class="n3" cx="752" cy="162" r="13"/>
  <text class="num" x="748.2" y="166.7">3</text>
  <text class="panelTitle" x="774" y="169">Typical trade-off signature</text>

  <rect class="chipA" x="72" y="194" width="236" height="68" rx="12"/>
  <rect class="barA" x="72" y="194" width="8" height="68" rx="8"/>
  <text class="label" x="92" y="219">Task quality</text>
  <text class="body" x="92" y="241">does this improve the next-step decision?</text>

  <rect class="chipB" x="72" y="276" width="236" height="68" rx="12"/>
  <rect class="barB" x="72" y="276" width="8" height="68" rx="8"/>
  <text class="label" x="92" y="301">Freshness</text>
  <text class="body" x="92" y="323">is the information still current?</text>

  <rect class="chipC" x="72" y="358" width="236" height="68" rx="12"/>
  <rect class="barC" x="72" y="358" width="8" height="68" rx="8"/>
  <text class="label" x="92" y="383">Fidelity</text>
  <text class="body" x="92" y="405">can key details be recovered exactly?</text>

  <rect class="chipD" x="72" y="440" width="236" height="68" rx="12"/>
  <rect class="barD" x="72" y="440" width="8" height="68" rx="8"/>
  <text class="label" x="92" y="465">Latency</text>
  <text class="body" x="92" y="487">can the system stay responsive online?</text>

  <rect class="chipE" x="72" y="522" width="236" height="68" rx="12"/>
  <rect class="barE" x="72" y="522" width="8" height="68" rx="8"/>
  <text class="label" x="92" y="547">Cost</text>
  <text class="body" x="92" y="569">token, retrieval, and inference budget</text>

  <rect class="chipF" x="72" y="604" width="236" height="68" rx="12"/>
  <rect class="barF" x="72" y="604" width="8" height="68" rx="8"/>
  <text class="label" x="92" y="629">Controllability</text>
  <text class="body" x="92" y="651">can engineers explain and debug the policy?</text>

  <rect class="chipA" x="390" y="194" width="278" height="72" rx="12"/>
  <rect class="barA" x="390" y="194" width="8" height="72" rx="8"/>
  <text class="label" x="410" y="220">Keep more raw text</text>
  <text class="body" x="410" y="242">retain original history, logs, and documents</text>

  <rect class="chipB" x="390" y="284" width="278" height="72" rx="12"/>
  <rect class="barB" x="390" y="284" width="8" height="72" rx="8"/>
  <text class="label" x="410" y="310">Retrieve on demand</text>
  <text class="body" x="410" y="332">externalize knowledge and fetch only top evidence</text>

  <rect class="chipC" x="390" y="374" width="278" height="72" rx="12"/>
  <rect class="barC" x="390" y="374" width="8" height="72" rx="8"/>
  <text class="label" x="410" y="400">Compress and summarize</text>
  <text class="body" x="410" y="422">remove redundancy and shorten the working set</text>

  <rect class="chipD" x="390" y="464" width="278" height="72" rx="12"/>
  <rect class="barD" x="390" y="464" width="8" height="72" rx="8"/>
  <text class="label" x="410" y="490">Memory hierarchy</text>
  <text class="body" x="410" y="512">keep long-term traces outside the live prompt</text>

  <rect class="chipF" x="390" y="554" width="278" height="72" rx="12"/>
  <rect class="barF" x="390" y="554" width="8" height="72" rx="8"/>
  <text class="label" x="410" y="580">Structured state rendering</text>
  <text class="body" x="410" y="602">encode control state explicitly instead of prose</text>

  <rect class="summary" x="752" y="194" width="372" height="72" rx="12"/>
  <text class="label" x="772" y="220">Keep more raw text</text>
  <text class="good" x="772" y="243">Helps: fidelity, auditability</text>
  <text class="bad" x="772" y="262">Hurts: latency, cost, interference risk</text>

  <rect class="summary" x="752" y="284" width="372" height="72" rx="12"/>
  <text class="label" x="772" y="310">Retrieve on demand</text>
  <text class="good" x="772" y="333">Helps: freshness, scalability, context density</text>
  <text class="bad" x="772" y="352">Hurts: recall stability, retrieval dependence</text>

  <rect class="summary" x="752" y="374" width="372" height="72" rx="12"/>
  <text class="label" x="772" y="400">Compress and summarize</text>
  <text class="good" x="772" y="423">Helps: latency, cost, token efficiency</text>
  <text class="bad" x="772" y="442">Hurts: fidelity, exact recoverability</text>

  <rect class="summary" x="752" y="464" width="372" height="72" rx="12"/>
  <text class="label" x="772" y="490">Memory hierarchy</text>
  <text class="good" x="772" y="513">Helps: long-horizon continuity, reuse across steps</text>
  <text class="bad" x="772" y="532">Hurts: staleness control, consistency management</text>

  <rect class="summary" x="752" y="554" width="372" height="72" rx="12"/>
  <text class="label" x="772" y="580">Structured state rendering</text>
  <text class="good" x="772" y="603">Helps: controllability, debuggability, token efficiency</text>
  <text class="bad" x="772" y="622">Hurts: controller complexity, schema design burden</text>

  <rect class="badge" x="780" y="654" width="320" height="62" rx="10"/>
  <text class="label" x="804" y="681">Systems conclusion</text>
  <text class="body" x="804" y="702">The best policy is workload-specific and usually sits on a Pareto frontier,</text>
  <text class="body" x="804" y="719">not at the maximum of any single metric.</text>

  <path class="arrow" d="M668 230H752"/>
  <path class="arrow" d="M668 320H752"/>
  <path class="arrow" d="M668 410H752"/>
  <path class="arrow" d="M668 500H752"/>
  <path class="arrow" d="M668 590H752"/>

  <rect class="footer" x="56" y="774" width="1088" height="26" rx="13"/>
  <text class="footerText" x="80" y="792">Context optimization is not “maximize quality at all costs”; it is the search for a deployable balance across multiple objectives under workload-specific constraints.</text>
</svg>
