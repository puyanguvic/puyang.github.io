name: Check CV PDF sync

on:
  pull_request:
    paths:
      - "cv/**"
      - "docs/public/cv/puyang-resume.pdf"
      - ".github/workflows/check-cv.yml"
  push:
    branches: ["main"]
    paths:
      - "cv/**"
      - "docs/public/cv/puyang-resume.pdf"
      - ".github/workflows/check-cv.yml"

permissions:
  contents: read

jobs:
  check-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CV-related changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
            base="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          fi

          git diff --name-only "$base" "$head" | tee changed-files.txt

          if grep -q '^cv/' changed-files.txt; then
            echo "cv_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "cv_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -qx 'docs/public/cv/puyang-resume.pdf' changed-files.txt; then
            echo "pdf_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pdf_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require refreshed PDF
        if: steps.changes.outputs.cv_changed == 'true' && steps.changes.outputs.pdf_changed != 'true'
        shell: bash
        run: |
          echo "::error file=docs/public/cv/puyang-resume.pdf::CV source changed under cv/, but docs/public/cv/puyang-resume.pdf was not updated. Run 'npm run build:cv' and commit the refreshed PDF."
          exit 1

      - name: Compile CV
        if: steps.changes.outputs.cv_changed == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: cv
          root_file: puyang-resume.tex
          latexmk_use_xelatex: true
