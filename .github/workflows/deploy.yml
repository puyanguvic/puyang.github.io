name: Deploy VitePress site (gh-pages)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build CV (LaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: content/cv
          root_file: puyang-resume.tex
          latexmk_use_xelatex: true

      - name: Copy CV into VitePress public assets
        run: |
          set -euo pipefail
          if [[ ! -f content/cv/puyang-resume.pdf ]]; then
            echo "Expected built PDF not found: content/cv/puyang-resume.pdf"
            ls -la content/cv || true
            exit 1
          fi
          node scripts/copy-cv.mjs --require

      - name: Build
        run: |
          set -euo pipefail
          npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs/.vitepress/dist
          force_orphan: true
