name: Deploy Hugo site (gh-pages)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build CV (LaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: content/cv
          root_file: puyang-resume.tex
          latexmk_use_xelatex: true

      - name: Copy CV into site
        run: |
          set -euo pipefail
          if [[ ! -f content/cv/puyang-resume.pdf ]]; then
            echo "Expected built PDF not found: content/cv/puyang-resume.pdf"
            ls -la content/cv || true
            exit 1
          fi
          cp content/cv/puyang-resume.pdf static/cv.pdf

      - name: Build
        run: |
          set -euo pipefail
          if [[ -n "${{ vars.CUSTOM_DOMAIN }}" ]]; then
            BASE_URL="https://${{ vars.CUSTOM_DOMAIN }}/"
            echo "Using --baseURL=${BASE_URL} (CUSTOM_DOMAIN repo variable)"
            hugo --minify --baseURL "${BASE_URL}"
          else
            echo "Using baseURL from Hugo config (hugo.yaml)"
            hugo --minify
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          force_orphan: true
